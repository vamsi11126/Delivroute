services:
  - type: web
    name: delivroute-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SOCKET_CORS_ORIGINS
        value: https://delivroute-web-six.vercel.app,http://localhost:3000
